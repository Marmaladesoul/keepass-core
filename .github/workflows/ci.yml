# CI for the public keepass-core workspace.
#
# Public repo → unlimited GitHub Actions minutes on all runners. We run the
# test job on a Linux/macOS/Windows matrix because this library is intended
# to work identically across all three platforms.

name: CI

on:
  pull_request:
    branches: [main]
  # Allow manual dispatch from the Actions tab.
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Treat warnings as errors in CI even when rustc/clippy defaults wouldn't.
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: cargo test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  doc:
    name: cargo doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --all-features

  msrv:
    name: MSRV build (rust ${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # The rust-version declared in Cargo.toml. Bump both in lockstep.
        rust: ["1.85"]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-features

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Checks Cargo.lock against the RustSec Advisory Database for known
    # CVEs in any transitive dependency. Fast (~5 s) and a no-brainer for
    # a crypto / password-handling library.
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    # Stricter than cargo audit: enforces a license allowlist (no GPL
    # / unknown licenses sneaking into this MIT/Apache crate), a source
    # allowlist (deps must come from crates.io — blocks an attacker who
    # slips in a path/git override), a banned-crates list, and detects
    # duplicate-version bloat. Config lives in `deny.toml` at the
    # workspace root.
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          # `advisories` and `licenses` overlap with audit but having
          # both fail on the same advisory gives belt-and-braces. The
          # interesting additions are `bans` and `sources`.
          arguments: --all-features

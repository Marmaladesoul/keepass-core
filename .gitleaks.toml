# gitleaks config for keepass-core.
#
# This is a KeePass (KDBX) library: its test fixtures are by nature full of
# *test* passwords, keys, and sample databases (KeePassXC / pykeepass /
# kdbxweb vectors, mock PEM keys, fixture KDBX files). Those are not real
# secrets, so the whole fixtures tree is allowlisted. Real code is still
# scanned with the full default ruleset.

[extend]
useDefault = true

[allowlist]
description = "Test fixtures: mock keys, KeePass test vectors, and sample KDBX files — test data, not real secrets."
paths = [
    '''tests/fixtures/.*''',
]
